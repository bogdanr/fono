[package]
name = "fono"
description = "Lightweight native voice-dictation daemon and CLI."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[[bin]]
name = "fono"
path = "src/main.rs"

[features]
# Default release ships with local STT (whisper.cpp) and tray. Slim
# cloud-only build: `cargo build --no-default-features --features tray`.
# Local LLM (`llama-local`) stays opt-in until the v0.2 wiring lands —
# see docs/plans/2026-04-25-fono-local-default-v1.md task H8.
default = ["tray", "local-models"]
tray = ["fono-tray/tray-backend"]
local-models = ["fono-stt/whisper-local"]
llama-local = ["fono-llm/llama-local"]
# X11 key injection via enigo (libxdo). Keep opt-in: requires `libxdo`
# at build time, which isn't installed on every Linux desktop. Users
# without `wtype`/`ydotool` on Wayland or `enigo` on X11 still get a
# working dictation thanks to fono-inject's clipboard fallback (see
# `fono_inject::type_text_with_outcome`).
enigo = ["fono-inject/enigo-backend"]
# Cloud meta-feature so a single flag enables all hosted providers.
cloud-all = ["fono-stt/openai", "fono-llm/anthropic"]

[dependencies]
fono-core = { path = "../fono-core" }
fono-audio = { path = "../fono-audio" }
fono-stt = { path = "../fono-stt" }
fono-llm = { path = "../fono-llm" }
fono-hotkey = { path = "../fono-hotkey" }
fono-inject = { path = "../fono-inject" }
fono-tray = { path = "../fono-tray" }
fono-overlay = { path = "../fono-overlay" }
fono-ipc = { path = "../fono-ipc" }
fono-download = { path = "../fono-download" }

anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
clap = { workspace = true }
clap_complete = "4.5"
dialoguer = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
notify-rust = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
tempfile = { workspace = true }
