[package]
name = "fono"
description = "Lightweight native voice-dictation daemon and CLI."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[[bin]]
name = "fono"
path = "src/main.rs"

[features]
# Tray icon is on by default on desktop builds. Disable with
# `cargo build --no-default-features` for headless CI or cross-compile runs
# without a GTK/appindicator toolchain.
default = ["tray"]
tray = ["fono-tray/tray-backend"]

[dependencies]
fono-core = { path = "../fono-core" }
fono-audio = { path = "../fono-audio" }
fono-stt = { path = "../fono-stt" }
fono-llm = { path = "../fono-llm" }
fono-hotkey = { path = "../fono-hotkey" }
fono-inject = { path = "../fono-inject" }
fono-tray = { path = "../fono-tray" }
fono-overlay = { path = "../fono-overlay" }
fono-ipc = { path = "../fono-ipc" }
fono-download = { path = "../fono-download" }

anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
clap = { workspace = true }
dialoguer = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
