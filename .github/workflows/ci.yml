name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "plans/**"
      - "CHANGELOG.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "plans/**"
      - "CHANGELOG.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Fono is Linux-first per the design plan; macOS/Windows are
        # release-time targets handled by the release workflow on tag,
        # not on every PR. Keeps CI fast and avoids platform-specific
        # tray-icon stub mismatches and CRLF fmt drift.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build + desktop deps
        # `clang`, `cmake`, `libclang-dev`, `build-essential` are needed
        # by `whisper-rs-sys` and `llama-cpp-sys-2` (both vendor C/C++
        # ggml sources and shell out to cmake at build time). `libxdo-dev`
        # is the build-time header set for `fono-inject`'s X11 xtest path,
        # and `libasound2-dev` is required by `cpal`'s build script even
        # though the daemon delegates audio to `pactl` at runtime. The
        # GTK / appindicator stack was dropped when the tray switched to
        # pure-Rust `ksni` (no GTK crates remain in `Cargo.lock`); keep
        # this list in lockstep with `release.yml`'s `Install Linux build
        # deps` and `ci.yml`'s `size-budget` step.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang cmake pkg-config libclang-dev \
            libxdo-dev libasound2-dev xz-utils \
            libxkbcommon-dev libwayland-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch minimal onnxruntime static lib (pin ORT_LIB_LOCATION)
        # `tts-local` is a default feature, so `cargo build`/`clippy`/`test`
        # all link the statically-pinned `libonnxruntime.a`. Pull it from
        # the fono-voice release mirror (SHA-256 verified) and pin
        # ORT_LIB_LOCATION for every later step in this job — the `ort`
        # build never touches the upstream CDN.
        run: |
          ort_dir="$(sh scripts/fetch-onnxruntime.sh)"
          echo "ORT_LIB_LOCATION=${ort_dir}" >> "$GITHUB_ENV"
          echo "pinned ORT_LIB_LOCATION=${ort_dir}"

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: fono-bench latency smoke (ignored tests)
        run: cargo test -p fono-bench --release -- --ignored --nocapture

      # Wave 2 Thread C: real-fixture equivalence gate. Replaces the
      # prior `cargo bench --no-run` compile-only sanity. The whisper
      # tiny.en model is cached across runs by hashing on the pinned
      # SHA below; a fresh download takes ~30s (76 MiB) and a poisoned
      # mirror is caught by the sha256sum --check step.
      - name: Cache whisper tiny.en model
        id: whisper-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/fono/models/whisper/ggml-tiny.en.bin
          key: whisper-ggml-tiny-en-921e4cf8686fdd993dcd081a5da5b6c365bfde1162e72b08d75ac75289920b1f

      - name: Download whisper tiny.en model (cache miss)
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${HOME}/.cache/fono/models/whisper"
          mkdir -p "${cache_dir}"
          curl -fsSL --retry 3 \
            -o "${cache_dir}/ggml-tiny.en.bin" \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"
          echo "921e4cf8686fdd993dcd081a5da5b6c365bfde1162e72b08d75ac75289920b1f  ${cache_dir}/ggml-tiny.en.bin" \
            | sha256sum --check -

      - name: fono-bench equivalence (tiny.en gate)
        shell: bash
        run: |
          set -euo pipefail
          cargo run --release -p fono-bench \
            --features equivalence,whisper-local -- \
            equivalence \
              --stt local \
              --model tiny.en \
              --output ci-bench.json \
              --baseline \
              --no-legend
          # Compare structural verdicts against the committed baseline.
          # Timings are not compared (the baseline file omits them).
          python3 - <<'PY'
          import json, sys
          ours = json.load(open('ci-bench.json'))
          gold = json.load(open('docs/bench/baseline-comfortable-tiny-en.json'))
          diffs = []
          ours_by = {r['fixture']: r['verdict'] for r in ours['results']}
          gold_by = {r['fixture']: r['verdict'] for r in gold['results']}
          for k in sorted(set(ours_by) | set(gold_by)):
              if ours_by.get(k) != gold_by.get(k):
                  diffs.append(f"{k}: ci={ours_by.get(k)} baseline={gold_by.get(k)}")
          if diffs:
              print("equivalence verdicts diverged from baseline:")
              for d in diffs: print(f"  {d}")
              sys.exit(1)
          print(f"OK \u2014 {len(ours_by)} fixture verdicts match baseline.")
          PY

  size-budget:
    # ADR 0022 / Phase 5 of `plans/2026-04-30-fono-single-binary-size-v1.md`.
    # Builds the canonical ship artefact (`x86_64-unknown-linux-gnu`,
    # `release-slim`, default features — same target+profile as
    # `release.yml`) and asserts:
    #   - size ≤ 22 MiB (23 068 672 bytes) — see matrix value below
    #   - `NEEDED` set is exactly the universal glibc + libgcc_s ABI
    #     present on every desktop Linux ≥ ~2018. Anything else
    #     (libgtk*, libstdc++, libgomp, libayatana, libxdo, libasound,
    #     libxkbcommon, libwayland-*) fails the gate. The native
    #     Wayland overlay backend (`fono-overlay/backend-wlr`) links
    #     `xkbcommon`/`wayland-client` via dlopen / unreferenced-symbol
    #     paths, so `-Wl,--as-needed` strips both from the final
    #     `NEEDED` set — the gate stays tight. ADR 0018's
    #     `--allow-multiple-definition` keeps a single ggml copy at
    #     link time; that invariant is enforced by the link itself, not
    #     a post-strip nm grep (release-slim sets `strip = "symbols"`).
    #
    # Runs in parallel with `test`; one byte or one stray NEEDED entry
    # fails the PR. Static-musl ship is deferred (plan Phase 2.4); see
    # ADR 0022 amendment.
    #
    # Pinned to ubuntu-22.04 (glibc 2.35) so the binary's GLIBC_2.X
    # symbol versions stay compatible with Ubuntu 22.04+, Debian 12+,
    # Fedora 36+, and any glibc ≥ 2.35 host. ubuntu-latest = 24.04 =
    # glibc 2.39 would silently bump the floor and exclude ~3 years
    # of supported distros. Must stay in lockstep with `release.yml`'s
    # build matrix.
    name: Binary size & deps audit (${{ matrix.variant }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU variant — the default download. Strict 4-entry allowlist.
          # Mirrors the canonical `fono-vX.Y.Z-x86_64` release asset
          # (default features, which now INCLUDE `tts-local`). Budget
          # history: 20 MiB at v0.4.0 (18.08 MB) → 22 MiB at v0.7.1 →
          # 24 MiB at v0.9.0 (22.5 MB) → 26 MiB at 2026-06-02 when
          # `tts-local` became default (statically-linked onnxruntime,
          # measured 24.45 MiB). Still well under the ≤32 MiB `cpu` cap
          # (ADR 0022) and rejects accidental dependency drift. The
          # onnxruntime fetch step below pins `libonnxruntime.a` so the
          # `ort` link resolves; the 4-entry allowlist is unchanged because
          # onnxruntime + libstdc++ are statically embedded.
          - variant: cpu
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            features: ""
            budget_bytes: 27262976
            extra_needed: ""
            dynamic_linker: ld-linux-x86-64.so.2
          # GPU variant — Vulkan-enabled, ~60 MB. Adds `libvulkan.so.1`
          # to the NEEDED allowlist; budget is loose at 64 MiB (sanity
          # ceiling, not a tight gate). Mirrors `fono-gpu-vX.Y.Z-x86_64`.
          # Per `plans/2026-05-02-fono-cpu-gpu-variants-v1.md`.
          - variant: gpu
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            features: accel-vulkan
            budget_bytes: 67108864
            extra_needed: libvulkan.so.1
            dynamic_linker: ld-linux-x86-64.so.2
          # CPU aarch64 — same shape as the x86_64 CPU row. Runs on
          # GitHub's hosted `ubuntu-22.04-arm` image (GA Jan 2025,
          # free for public repos), same glibc 2.35 floor. The
          # interpreter on aarch64 is `ld-linux-aarch64.so.1` and on
          # aarch64 it appears only in `PT_INTERP`, not `NEEDED`, so
          # the allowlist drops it; the universal libc/libm/libgcc_s
          # triple still applies. Budget matches x86_64 CPU (26 MiB now
          # that `tts-local` is default; the aarch64 `libonnxruntime.a`
          # is hosted + pinned in `fetch-onnxruntime.sh`).
          - variant: cpu
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            features: ""
            budget_bytes: 27262976
            extra_needed: ""
            dynamic_linker: ld-linux-aarch64.so.1
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        # Mirror `release.yml`'s "Install Linux build deps" step exactly
        # so the gate measures the same artefact users ship. The GPU
        # variant adds Vulkan headers + the `shaderc` SPIR-V compiler
        # (`glslc`) that ggml-vulkan's CMake requires to build its
        # 150+ shaders at compile time.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang cmake pkg-config libclang-dev \
            libxdo-dev \
            libxkbcommon-dev libwayland-dev
          if [ "${{ matrix.variant }}" = "gpu" ]; then
            # Ubuntu 22.04's stock repo has no `glslc` package, and
            # `glslang-tools` only ships `glslangValidator` (different
            # CLI; ggml-vulkan's CMake explicitly requires the
            # `glslc` Vulkan component). Pull `shaderc` from the
            # LunarG apt repo — a few MB only — instead of the full
            # 600+ MB `vulkan-sdk` meta-package that would time out
            # the build.
            sudo install -d -m 0755 /usr/share/keyrings
            curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
              | sudo gpg --dearmor -o /usr/share/keyrings/lunarg.gpg
            echo "deb [signed-by=/usr/share/keyrings/lunarg.gpg] https://packages.lunarg.com/vulkan jammy main" \
              | sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list >/dev/null
            sudo apt-get update -qq
            # LunarG splits headers out of libvulkan-dev (which on
            # their repo is a tiny ~100 KB loader-dev stub); the actual
            # Vulkan headers live in `vulkan-headers`. Without it,
            # CMake's FindVulkan fails with
            # `missing: Vulkan_INCLUDE_DIR`.
            sudo apt-get install -y -qq \
              vulkan-headers libvulkan-dev glslang-tools shaderc
            command -v glslc
            glslc --version | head -1
            ls /usr/include/vulkan/vulkan.h
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          # Suffix the cache key with the runner image AND variant.
          # Swatinem's default key only varies on `runner.os` ("Linux");
          # different glibc generations and different feature sets must
          # not share cached build-script binaries.
          # `-portable` suffix mirrors release.yml — busts cache for the
          # GGML_NATIVE=OFF baseline rolled in via .cargo/config.toml [env].
          key: size-budget-${{ matrix.runner }}-${{ matrix.variant }}-${{ matrix.arch }}-portable

      - name: Fetch minimal onnxruntime static lib (pin ORT_LIB_LOCATION)
        # `tts-local` is a default feature, so every variant here links the
        # statically-pinned `libonnxruntime.a`. Pull the prebuilt,
        # op-set-matched archive from the fono-voice release mirror and pin
        # it via ORT_LIB_LOCATION so the `ort` build never touches the
        # upstream CDN. The fetcher verifies the SHA-256 and prints the
        # containing dir on stdout (diagnostics to stderr). `xz-utils` is
        # the only extra tool it needs beyond the base deps step.
        run: |
          sudo apt-get install -y -qq xz-utils
          ort_dir="$(TARGET=${{ matrix.target }} sh scripts/fetch-onnxruntime.sh)"
          echo "ORT_LIB_LOCATION=${ort_dir}" >> "$GITHUB_ENV"
          echo "pinned ORT_LIB_LOCATION=${ort_dir}"

      - name: Build canonical ship binary
        # GGML ISA baseline (GGML_NATIVE=OFF + AVX2/FMA/F16C/BMI2) is
        # inherited from `.cargo/config.toml`; keep this build identical to
        # what release.yml produces so the size budget reflects the actual
        # shipped artefact.
        run: |
          extra=""
          if [ -n "${{ matrix.features }}" ]; then
            extra="--features ${{ matrix.features }}"
          fi
          cargo build -p fono --profile release-slim --target ${{ matrix.target }} $extra

      - name: Assert size budget + NEEDED allowlist
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release-slim/fono"
          budget_bytes=${{ matrix.budget_bytes }}
          # Universal glibc + libgcc_s ABI. Modern glibc (≥ 2.34) merged
          # libpthread/librt/libdl back into libc.so.6. Audio is delegated
          # to `pactl` (no libasound); libgomp/libstdc++ are statically
          # embedded via `llama-cpp-2/static-openmp,static-stdcxx`; tray is
          # ksni (pure-Rust D-Bus, no GTK). The GPU variant adds
          # `libvulkan.so.1` (provided by `vulkan-loader` /
          # `mesa-vulkan-loaders` / `libvulkan1` on every modern desktop
          # Linux distro). The dynamic linker is included in the
          # allowlist on x86_64 (where it appears in NEEDED on glibc <
          # 2.34) and as a no-op on aarch64 (PT_INTERP only, not
          # NEEDED); listing it here keeps the gate robust across
          # toolchain generations.
          allowlist='libc.so.6 libm.so.6 libgcc_s.so.1 ${{ matrix.dynamic_linker }} ${{ matrix.extra_needed }}'

          test -f "${bin}"
          size="$(stat -c%s "${bin}")"
          printf "size: %s bytes — budget %s bytes\n" "${size}" "${budget_bytes}"
          if [ "${size}" -gt "${budget_bytes}" ]; then
            echo "FAIL: ${{ matrix.variant }} (${{ matrix.arch }}) binary exceeds budget by $((size - budget_bytes)) bytes" >&2
            exit 5
          fi

          # Extract NEEDED entries, one per line, brackets stripped.
          actual_needed="$(readelf -d "${bin}" \
            | awk '/\(NEEDED\)/ { gsub(/[][]/,"",$NF); print $NF }' \
            | sort -u)"
          allowed_sorted="$(printf "%s\n" ${allowlist} | sort -u)"

          extras="$(comm -23 <(printf "%s\n" "${actual_needed}") <(printf "%s\n" "${allowed_sorted}") || true)"
          if [ -n "${extras}" ]; then
            echo "FAIL: unexpected NEEDED entries (not in allowlist):" >&2
            printf "  %s\n" ${extras} >&2
            echo "Full NEEDED set:" >&2
            printf "  %s\n" ${actual_needed} >&2
            exit 5
          fi
          echo "size-budget gate passed (${{ matrix.variant }}, ${{ matrix.arch }}); NEEDED:"
          printf "  %s\n" ${actual_needed}

      - name: Install cargo-bloat (prebuilt)
        if: always()
        # Pull the prebuilt binary from crates.io's GH releases instead
        # of building from source on every run (~5–10s saved). The
        # action caches the binary across runs.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: cargo-bloat top contributors (artefact)
        if: always()
        run: |
          extra=""
          if [ -n "${{ matrix.features }}" ]; then
            extra="--features ${{ matrix.features }}"
          fi
          cargo bloat \
            -p fono \
            --profile release-slim \
            --target ${{ matrix.target }} \
            $extra \
            --crates -n 30 \
            > cargo-bloat-crates-${{ matrix.variant }}-${{ matrix.arch }}.txt 2>&1 || true
          cargo bloat \
            -p fono \
            --profile release-slim \
            --target ${{ matrix.target }} \
            $extra \
            -n 50 \
            > cargo-bloat-symbols-${{ matrix.variant }}-${{ matrix.arch }}.txt 2>&1 || true

      - name: Upload cargo-bloat reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-bloat-${{ matrix.variant }}-${{ matrix.arch }}
          path: cargo-bloat-*.txt
          if-no-files-found: ignore

  deny:
    name: License & advisory audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories sources
