name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Fono is Linux-first per the design plan; macOS/Windows are
        # release-time targets handled by the release workflow on tag,
        # not on every PR. Keeps CI fast and avoids platform-specific
        # tray-icon stub mismatches and CRLF fmt drift.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build + desktop deps
        # `clang`, `cmake`, `libclang-dev`, `build-essential` are needed
        # by `whisper-rs-sys` and `llama-cpp-sys-2` (both vendor C/C++
        # ggml sources and shell out to cmake at build time). The rest
        # are runtime deps for the tray + text-injection stack. Keep
        # this list in sync with the `Install Linux build deps` step in
        # `.github/workflows/release.yml`.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang cmake pkg-config libclang-dev \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev \
            libasound2-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: fono-bench latency smoke (ignored tests)
        run: cargo test -p fono-bench --release -- --ignored --nocapture

      - name: fono-bench criterion (compile-only sanity)
        run: cargo bench -p fono-bench --no-run

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories sources
