name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: fono
  # Opt into Node.js 24 runtime for JS actions (silences Node 20
  # deprecation warnings emitted by actions/{checkout,upload-artifact,
  # download-artifact} and softprops/action-gh-release).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Signing with minisign is optional: if the repo secret MINISIGN_KEY is set
# (along with MINISIGN_PASSWORD), the release job will sign SHA256SUMS and
# attach SHA256SUMS.minisig to the draft release.

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang cmake pkg-config libasound2-dev libclang-dev \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build (native)
        run: cargo build --profile release-slim --target ${{ matrix.target }} -p fono

      - name: Stage release binary + internal staging tarball
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          # Map cargo target triple -> short arch label used in release names.
          case "${target}" in
            x86_64-*)   arch=x86_64 ;;
            aarch64-*)  arch=aarch64 ;;
            *)          arch="${target}" ;;
          esac

          bin_src="target/${target}/release-slim/${BIN_NAME}"
          if [[ "${target}" == *windows* ]]; then bin_src="${bin_src}.exe"; fi

          # 1) Bare binary that will be uploaded as a release asset.
          mkdir -p out-bin
          asset="${BIN_NAME}-${version}-${arch}"
          [[ "${target}" == *windows* ]] && asset="${asset}.exe"
          cp "${bin_src}" "out-bin/${asset}"
          chmod +x "out-bin/${asset}"

          # 2) Internal staging tarball consumed by the .deb/.arch/.txz/.lzm
          #    package jobs below. Not uploaded to the GitHub release.
          stem="${BIN_NAME}-${version}-${arch}"
          stage="out-stage/${stem}"
          mkdir -p "${stage}"
          cp "${bin_src}" "${stage}/${BIN_NAME}"
          cp README.md LICENSE CHANGELOG.md "${stage}/"
          cp -r packaging "${stage}/"
          tar -czf "out-stage/${stem}.tar.gz" -C out-stage "${stem}"
          rm -rf "${stage}"
          ls -la out-bin out-stage

      - name: Upload bare binary (release asset)
        uses: actions/upload-artifact@v5
        with:
          name: fono-bin-${{ matrix.target }}
          path: out-bin/*
          if-no-files-found: error

      - name: Upload internal staging tarball (package-job input)
        uses: actions/upload-artifact@v5
        with:
          name: fono-stage-${{ matrix.target }}
          path: out-stage/*.tar.gz
          if-no-files-found: error

  linux-deb:
    name: Debian package (.deb)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-stage-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build binary Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64"
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev

          mkdir -p debroot/DEBIAN debroot/usr/bin debroot/usr/share/doc/fono \
            debroot/usr/share/applications debroot/usr/share/icons/hicolor/scalable/apps \
            debroot/lib/systemd/user
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" debroot/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md debroot/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop debroot/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg debroot/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service debroot/lib/systemd/user/fono.service

          installed_size="$(du -sk debroot | cut -f1)"
          cat > debroot/DEBIAN/control <<EOF
          Package: fono
          Version: ${version}-1
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Bogdan Rădulescu <bogdan@nimblex.net>
          Installed-Size: ${installed_size}
          Depends: libc6, libgcc-s1, libstdc++6, libasound2, libgtk-3-0, libayatana-appindicator3-1
          Recommends: xsel | xclip | wl-clipboard, pipewire | pulseaudio
          Homepage: https://github.com/bogdanr/fono
          Description: Native desktop voice dictation tool
           Fono is a lightweight Rust voice dictation daemon with local and cloud
           speech-to-text providers, optional LLM cleanup, tray controls, history,
           and text injection for desktop applications.
          EOF
          chmod 0644 debroot/DEBIAN/control

          mkdir -p dist-deb
          dpkg-deb --build --root-owner-group debroot "dist-deb/fono_${version}-1_amd64.deb"

      - uses: actions/upload-artifact@v5
        with:
          name: fono-pkg-deb
          path: dist-deb/*.deb
          if-no-files-found: error

  linux-arch:
    name: Arch package (.pkg.tar.zst)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-stage-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build binary Arch package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64"
          sudo apt-get update -qq
          sudo apt-get install -y -qq libarchive-tools zstd

          mkdir -p pkg/usr/bin pkg/usr/share/doc/fono \
            pkg/usr/share/applications pkg/usr/share/icons/hicolor/scalable/apps \
            pkg/usr/lib/systemd/user
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" pkg/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md pkg/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop pkg/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg pkg/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service pkg/usr/lib/systemd/user/fono.service

          size="$(du -sb pkg | cut -f1)"
          cat > pkg/.PKGINFO <<EOF
          pkgname = fono
          pkgbase = fono
          pkgver = ${version}-1
          pkgdesc = Native desktop voice dictation tool
          url = https://github.com/bogdanr/fono
          builddate = $(date +%s)
          packager = Bogdan Rădulescu <bogdan@nimblex.net>
          size = ${size}
          arch = x86_64
          license = GPL-3.0-only
          depend = glibc
          depend = gcc-libs
          depend = alsa-lib
          depend = gtk3
          depend = libayatana-appindicator
          optdepend = xsel: X11 clipboard fallback
          optdepend = xclip: X11 clipboard fallback
          optdepend = wl-clipboard: Wayland clipboard fallback
          EOF

          mkdir -p dist-arch
          (cd pkg && bsdtar --zstd -cf "../dist-arch/fono-${version}-1-x86_64.pkg.tar.zst" .)
          ls -la dist-arch

      - uses: actions/upload-artifact@v5
        with:
          name: fono-pkg-arch
          path: dist-arch/*.pkg.tar.zst
          if-no-files-found: error

  linux-slack:
    name: Slackware package (.txz)
    needs: build
    runs-on: ubuntu-latest
    container:
      image: vbatts/slackware:15.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-stage-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Run SlackBuild in binary mode
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64"
          # SlackBuild expects the upstream tarball alongside its directory.
          cp "linux-bin/${stem}.tar.gz" packaging/slackbuild/fono/
          cd packaging/slackbuild/fono
          chmod +x fono.SlackBuild
          VERSION="${version}" ARCH=x86_64 ./fono.SlackBuild
          mkdir -p "${GITHUB_WORKSPACE}/dist-slack"
          cp "/tmp/fono-${version}-x86_64-1.txz" "${GITHUB_WORKSPACE}/dist-slack/"

      - uses: actions/upload-artifact@v5
        with:
          name: fono-pkg-slack
          path: dist-slack/*.txz
          if-no-files-found: error

  linux-nimblex:
    name: NimbleX module (.lzm)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-stage-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build NimbleX .lzm
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64"
          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools

          # Stage the same install layout the .txz/.deb produce.
          mkdir -p pkg/usr/bin pkg/usr/share/doc/fono \
            pkg/usr/share/applications pkg/usr/share/icons/hicolor/scalable/apps \
            pkg/lib/systemd/user pkg/lib/systemd/user/default.target.wants
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" pkg/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md pkg/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop pkg/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg pkg/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service pkg/lib/systemd/user/fono.service
          # Autostart fono on user login: NimbleX mounts the lzm as an
          # aufs/overlay layer with no install hook, so the symlink that
          # `systemctl --user enable` would normally create has to live
          # inside the image itself.
          ln -sfn ../fono.service pkg/lib/systemd/user/default.target.wants/fono.service

          mkdir -p dist-nimblex
          mksquashfs pkg "dist-nimblex/fono-${version}-x86_64.lzm" \
            -comp xz -b 256K -noappend -no-recovery
          ls -la dist-nimblex

      - uses: actions/upload-artifact@v5
        with:
          name: fono-pkg-nimblex
          path: dist-nimblex/*.lzm
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: [build, linux-deb, linux-arch, linux-slack, linux-nimblex]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Only need CHANGELOG.md; shallow clone is fine.
          fetch-depth: 1

      - uses: actions/download-artifact@v5
        with:
          pattern: fono-bin-*
          path: artifacts
          merge-multiple: true

      - uses: actions/download-artifact@v5
        with:
          pattern: fono-pkg-*
          path: artifacts
          merge-multiple: true

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name "fono-v*-x86_64" -o -name "fono-v*-aarch64" -o -name "fono-v*-x86_64.exe" -o -name "*.deb" -o -name "*.pkg.tar.zst" -o -name "*.txz" -o -name "*.lzm" \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          # Wave 2 Thread B — emit a per-asset `<asset>.sha256` sidecar
          # for every release artefact. `fono update` (≥0.3.0) verifies
          # the streamed SHA-256 against this sidecar and refuses to
          # apply on mismatch. See crates/fono-update/src/lib.rs:462.
          for f in fono-v*-x86_64 fono-v*-aarch64 fono-v*-x86_64.exe \
                   *.deb *.pkg.tar.zst *.txz *.lzm; do
            [ -e "$f" ] || continue
            sha256sum "$f" > "${f}.sha256"
          done
          ls -la

      - name: Sign SHA256SUMS with minisign (optional)
        if: ${{ env.MINISIGN_KEY != '' }}
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          chmod 600 minisign.key
          cd release
          echo "$MINISIGN_PASSWORD" | minisign -S -s ../minisign.key -m SHA256SUMS
          rm ../minisign.key
          ls -la

      - name: Extract CHANGELOG section
        # Pull the body for this release out of CHANGELOG.md so the
        # GitHub release page shows the curated entry instead of the
        # auto-generated PR/commit list. Looks for a `## [X.Y.Z]`
        # heading matching the pushed tag (`v` prefix stripped) and
        # captures everything up to the next `## [` heading. If no
        # matching section exists, falls back to a one-line note so
        # the release still has *something* and `generate_release_notes`
        # appends the auto-generated PR list below it.
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="release/RELEASE_NOTES.md"
          mkdir -p release
          if grep -qE "^## \[${version}\]" CHANGELOG.md; then
            awk -v ver="${version}" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "${notes_file}"
            # Trim leading/trailing blank lines.
            sed -i -e '/./,$!d' -e :a -e '/^$/{$d;N;ba' -e '}' "${notes_file}"
            echo "Extracted $(wc -l < ${notes_file}) lines from CHANGELOG.md for ${version}."
          else
            printf 'Release %s. See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for details.\n' \
              "${version}" "${GITHUB_REPOSITORY}" > "${notes_file}"
            echo "::warning::No CHANGELOG.md section for ${version}; using fallback body."
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body_path: release/RELEASE_NOTES.md
          files: release/*
