name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: fono
  # Opt into Node.js 24 runtime for JS actions (silences Node 20
  # deprecation warnings emitted by actions/{checkout,upload-artifact,
  # download-artifact} and softprops/action-gh-release).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Signing with minisign is optional: if the repo secret MINISIGN_KEY is set
# (along with MINISIGN_PASSWORD), the release job will sign SHA256SUMS and
# attach SHA256SUMS.minisig to the draft release.

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang cmake pkg-config libasound2-dev libclang-dev \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build (native)
        run: cargo build --profile release-slim --target ${{ matrix.target }} -p fono

      - name: Stage + archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          stem="${BIN_NAME}-${version}-${target}"
          stage="dist/${stem}"
          mkdir -p "${stage}"

          bin="target/${target}/release-slim/${BIN_NAME}"
          if [[ "${target}" == *windows* ]]; then bin="${bin}.exe"; fi
          cp "${bin}" "${stage}/"
          cp README.md LICENSE CHANGELOG.md "${stage}/"
          cp -r packaging "${stage}/" || true

          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${stem}.zip" "${stem}"
          else
            tar -czf "${stem}.tar.gz" "${stem}"
          fi
          ls -la

      - name: Upload archive
        uses: actions/upload-artifact@v5
        with:
          name: fono-archive-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: ignore

  linux-deb:
    name: Debian package (.deb)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-archive-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build binary Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64-unknown-linux-gnu"
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev

          mkdir -p debroot/DEBIAN debroot/usr/bin debroot/usr/share/doc/fono \
            debroot/usr/share/applications debroot/usr/share/icons/hicolor/scalable/apps \
            debroot/lib/systemd/user
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" debroot/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md debroot/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop debroot/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg debroot/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service debroot/lib/systemd/user/fono.service

          installed_size="$(du -sk debroot | cut -f1)"
          cat > debroot/DEBIAN/control <<EOF
          Package: fono
          Version: ${version}-1
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Bogdan Rădulescu <bogdan@nimblex.net>
          Installed-Size: ${installed_size}
          Depends: libc6, libgcc-s1, libstdc++6, libasound2, libgtk-3-0, libayatana-appindicator3-1
          Recommends: xsel | xclip | wl-clipboard, pipewire | pulseaudio
          Homepage: https://github.com/bogdanr/fono
          Description: Native desktop voice dictation tool
           Fono is a lightweight Rust voice dictation daemon with local and cloud
           speech-to-text providers, optional LLM cleanup, tray controls, history,
           and text injection for desktop applications.
          EOF
          chmod 0644 debroot/DEBIAN/control

          mkdir -p dist-deb
          dpkg-deb --build --root-owner-group debroot "dist-deb/fono_${version}-1_amd64.deb"

      - uses: actions/upload-artifact@v5
        with:
          name: fono-archive-deb
          path: dist-deb/*.deb
          if-no-files-found: error

  linux-arch:
    name: Arch package (.pkg.tar.zst)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-archive-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build binary Arch package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64-unknown-linux-gnu"
          sudo apt-get update -qq
          sudo apt-get install -y -qq libarchive-tools zstd

          mkdir -p pkg/usr/bin pkg/usr/share/doc/fono \
            pkg/usr/share/applications pkg/usr/share/icons/hicolor/scalable/apps \
            pkg/usr/lib/systemd/user
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" pkg/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md pkg/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop pkg/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg pkg/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service pkg/usr/lib/systemd/user/fono.service

          size="$(du -sb pkg | cut -f1)"
          cat > pkg/.PKGINFO <<EOF
          pkgname = fono
          pkgbase = fono
          pkgver = ${version}-1
          pkgdesc = Native desktop voice dictation tool
          url = https://github.com/bogdanr/fono
          builddate = $(date +%s)
          packager = Bogdan Rădulescu <bogdan@nimblex.net>
          size = ${size}
          arch = x86_64
          license = GPL-3.0-only
          depend = glibc
          depend = gcc-libs
          depend = alsa-lib
          depend = gtk3
          depend = libayatana-appindicator
          optdepend = xsel: X11 clipboard fallback
          optdepend = xclip: X11 clipboard fallback
          optdepend = wl-clipboard: Wayland clipboard fallback
          EOF

          mkdir -p dist-arch
          (cd pkg && bsdtar --zstd -cf "../dist-arch/fono-${version}-1-x86_64.pkg.tar.zst" .)
          ls -la dist-arch

      - uses: actions/upload-artifact@v5
        with:
          name: fono-archive-arch
          path: dist-arch/*.pkg.tar.zst
          if-no-files-found: error

  linux-slack:
    name: Slackware package (.txz)
    needs: build
    runs-on: ubuntu-latest
    container:
      image: vbatts/slackware:15.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-archive-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Run SlackBuild in binary mode
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64-unknown-linux-gnu"
          # SlackBuild expects the upstream tarball alongside its directory.
          cp "linux-bin/${stem}.tar.gz" packaging/slackbuild/fono/
          cd packaging/slackbuild/fono
          chmod +x fono.SlackBuild
          VERSION="${version}" ARCH=x86_64 ./fono.SlackBuild
          mkdir -p "${GITHUB_WORKSPACE}/dist-slack"
          cp "/tmp/fono-${version}-x86_64-1.txz" "${GITHUB_WORKSPACE}/dist-slack/"

      - uses: actions/upload-artifact@v5
        with:
          name: fono-archive-slack
          path: dist-slack/*.txz
          if-no-files-found: error

  linux-nimblex:
    name: NimbleX module (.lzm)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: fono-archive-x86_64-unknown-linux-gnu
          path: linux-bin

      - name: Build NimbleX .lzm
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stem="fono-v${version}-x86_64-unknown-linux-gnu"
          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools

          # Stage the same install layout the .txz/.deb produce.
          mkdir -p pkg/usr/bin pkg/usr/share/doc/fono \
            pkg/usr/share/applications pkg/usr/share/icons/hicolor/scalable/apps \
            pkg/lib/systemd/user pkg/lib/systemd/user/default.target.wants
          tar -xzf "linux-bin/${stem}.tar.gz" -C /tmp
          install -m0755 "/tmp/${stem}/fono" pkg/usr/bin/fono
          install -m0644 README.md LICENSE CHANGELOG.md pkg/usr/share/doc/fono/
          install -m0644 packaging/slackbuild/fono/fono.desktop pkg/usr/share/applications/fono.desktop
          install -m0644 packaging/slackbuild/fono/fono.svg pkg/usr/share/icons/hicolor/scalable/apps/fono.svg
          install -m0644 packaging/systemd/fono.service pkg/lib/systemd/user/fono.service
          # Autostart fono on user login: NimbleX mounts the lzm as an
          # aufs/overlay layer with no install hook, so the symlink that
          # `systemctl --user enable` would normally create has to live
          # inside the image itself.
          ln -sfn ../fono.service pkg/lib/systemd/user/default.target.wants/fono.service

          mkdir -p dist-nimblex
          mksquashfs pkg "dist-nimblex/fono-${version}-x86_64.lzm" \
            -comp xz -b 256K -noappend -no-recovery
          ls -la dist-nimblex

      - uses: actions/upload-artifact@v5
        with:
          name: fono-archive-nimblex
          path: dist-nimblex/*.lzm
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: [build, linux-deb, linux-arch, linux-slack, linux-nimblex]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: fono-archive-*
          path: artifacts
          merge-multiple: true

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.pkg.tar.zst" -o -name "*.txz" -o -name "*.lzm" \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          ls -la

      - name: Sign SHA256SUMS with minisign (optional)
        if: ${{ env.MINISIGN_KEY != '' }}
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          chmod 600 minisign.key
          cd release
          echo "$MINISIGN_PASSWORD" | minisign -S -s ../minisign.key -m SHA256SUMS
          rm ../minisign.key
          ls -la

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*
