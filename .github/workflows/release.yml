name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: fono

# Signing with minisign is optional: if the repo secret MINISIGN_KEY is set
# (along with MINISIGN_PASSWORD), the release job will sign SHA256SUMS and
# attach SHA256SUMS.minisig to the draft release.

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Linux musl release tarball is the slim cloud build: no tray
      # (requires system gtk3 + libappindicator) and no whisper-rs
      # local-models (bundled C build is heavy under cross). Users who
      # want the GUI/local stack can install the .SlackBuild / AUR
      # packages or build from source.
      - name: Build (cross, slim cloud-only)
        if: matrix.cross
        run: cross build --profile release-slim --target ${{ matrix.target }} -p fono --no-default-features

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --profile release-slim --target ${{ matrix.target }} -p fono

      - name: Stage + archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          stem="${BIN_NAME}-${version}-${target}"
          stage="dist/${stem}"
          mkdir -p "${stage}"

          bin="target/${target}/release-slim/${BIN_NAME}"
          if [[ "${target}" == *windows* ]]; then bin="${bin}.exe"; fi
          cp "${bin}" "${stage}/"
          cp README.md LICENSE CHANGELOG.md "${stage}/"
          cp -r packaging "${stage}/" || true

          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${stem}.zip" "${stem}"
          else
            tar -czf "${stem}.tar.gz" "${stem}"
          fi
          ls -la

      - name: Stage raw per-arch binary (macOS only, for lipo)
        if: ${{ contains(matrix.target, 'apple-darwin') }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw
          cp "target/${{ matrix.target }}/release-slim/${BIN_NAME}" \
             "raw/${BIN_NAME}-${{ matrix.target }}"

      - name: Upload archive
        uses: actions/upload-artifact@v5
        with:
          name: fono-archive-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: ignore

      - name: Upload raw macOS binary
        if: ${{ contains(matrix.target, 'apple-darwin') }}
        uses: actions/upload-artifact@v5
        with:
          name: fono-raw-${{ matrix.target }}
          path: raw/*

  universal-macos:
    name: universal macOS
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          pattern: fono-raw-*-apple-darwin
          path: raw
          merge-multiple: true

      - name: lipo into universal binary
        shell: bash
        run: |
          set -euo pipefail
          ls -la raw
          version="${{ github.ref_name }}"
          stem="${BIN_NAME:-fono}-${version}-universal-apple-darwin"
          stage="dist/${stem}"
          mkdir -p "${stage}"
          lipo -create -output "${stage}/fono" \
            "raw/fono-x86_64-apple-darwin" \
            "raw/fono-aarch64-apple-darwin"
          cp README.md LICENSE CHANGELOG.md "${stage}/"
          cp -r packaging "${stage}/" || true
          file "${stage}/fono"
          cd dist && tar -czf "${stem}.tar.gz" "${stem}"

      - uses: actions/upload-artifact@v5
        with:
          name: fono-archive-universal-apple-darwin
          path: dist/*.tar.gz

  release:
    name: Draft GitHub Release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: fono-archive-*
          path: artifacts
          merge-multiple: true

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          ls -la

      - name: Sign SHA256SUMS with minisign (optional)
        if: ${{ env.MINISIGN_KEY != '' }}
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          chmod 600 minisign.key
          cd release
          echo "$MINISIGN_PASSWORD" | minisign -S -s ../minisign.key -m SHA256SUMS
          rm ../minisign.key
          ls -la

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*
