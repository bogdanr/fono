name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dco:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while read -r sha; do
            if ! git log -1 --format='%B' "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing 'Signed-off-by:'"
              missing=1
            fi
          done < <(git log --no-merges --format='%H' "$BASE_SHA..$HEAD_SHA")
          if [ "$missing" -ne 0 ]; then
            echo
            echo "All commits must be signed off (DCO). Re-run 'git commit -s --amend' or"
            echo "'git rebase -i --signoff $BASE_SHA' and force-push the branch."
            exit 1
          fi
          echo "All commits are signed off."
