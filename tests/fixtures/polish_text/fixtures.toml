# SPDX-License-Identifier: GPL-3.0-only
# Editable text-only polish fixtures for `fono-bench polish-text`.
#
# Rules for stable, comparable runs:
# - Keep `suite_version` unchanged unless fixture semantics change.
# - Add new fixtures instead of rewriting old ones when possible.
# - `raw` is the transcript as STT/local dictation produced it.
# - `reference` is one acceptable polished result; scoring also checks invariants.
# - `must_contain` substrings must appear in the polished output.
# - `must_not_contain` substrings catch chatter, translation, or prompt leakage.
# - `preserve_diacritics = true` means language-specific diacritics must survive.

suite_version = "polish-text-v1"
prompt_version = "fono-polish-default-v1"

[[fixture]]
id = "en_email_quick_note"
language = "en"
tags = ["email", "punctuation", "casual"]
raw = "hi john can you please send me the updated invoice by friday thanks"
reference = "Hi John, can you please send me the updated invoice by Friday? Thanks."
must_contain = ["John", "invoice", "Friday"]
must_not_contain = ["Here is", "Sure", "<<<", ">>>"]
preserve_diacritics = false
max_length_ratio = 1.8

[[fixture]]
id = "en_terminal_instruction"
language = "en"
tags = ["technical", "commands", "dictation"]
raw = "run cargo test workspace tests lib and if it fails paste the first error"
reference = "Run `cargo test --workspace --tests --lib`, and if it fails, paste the first error."
must_contain = ["cargo test", "--workspace", "--tests", "--lib"]
must_not_contain = ["Here is", "Sure", "I can", "<<<", ">>>"]
preserve_diacritics = false
max_length_ratio = 2.0

