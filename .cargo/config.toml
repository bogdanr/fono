# SPDX-License-Identifier: GPL-3.0-only
#
# Workspace-wide cargo config. Four concerns are encoded here:
#
# 1. Duplicate-ggml resolution (legacy, retiring under Phase 1 Task 1.2 of
#    `plans/2026-04-30-fono-single-binary-size-v1.md`). Both
#    `whisper-rs-sys` and `llama-cpp-sys-2` statically build their own copy
#    of ggml; without the link flag below GNU ld aborts with "multiple
#    definition of ggml_*". `--allow-multiple-definition` tells ld to keep
#    the first copy and discard the second. Both ggml builds are pinned
#    upstream to the same `ggerganov/ggml` family so the surviving copy is
#    ABI-compatible. This is the lightest-touch fix, recorded in ADR 0018.
#    It will be removed once we land source-level shared ggml (Task 1.2).
#
# 2. Dead-code elimination flags (Phase 1 Task 1.3 of the same plan).
#    `-ffunction-sections -fdata-sections` on the C/C++ side combined with
#    `-Wl,--gc-sections,--as-needed` on the linker line lets ld drop unused
#    arch kernels (AVX-512 / AMX / etc.) and helper functions that ggml,
#    whisper.cpp, and llama.cpp ship by default. Estimated saving: 1–2 MB
#    of `.text` after LTO. `--as-needed` further drops unused `NEEDED`
#    entries that intermediate linkage might otherwise pin.
#
# 3. Static C++/OpenMP runtime on ship builds (Phase 2 Task 2.3 of the same
#    plan). The actual `libstdc++` / `libgomp` linkage is controlled by the
#    `llama-cpp-2/static-stdcxx` and `llama-cpp-2/static-openmp` features in
#    `Cargo.toml`; those make the sys crate emit `static=stdc++` and
#    `static=gomp` in the correct place on the final link line. The musl
#    rustflags below only keep linker GC/as-needed enabled and add the generic
#    GCC runtime static flag for toolchains that honour it.
#
# We scope the flags conservatively — Linux GNU + Linux musl + Windows
# GNU. macOS uses ld64 (different duplicate-symbol semantics, no
# --gc-sections); MSVC's link.exe ignores duplicate COMDATs by default.

[target.'cfg(all(target_os = "linux", target_env = "gnu"))']
rustflags = [
    "-C", "link-arg=-Wl,--allow-multiple-definition",
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,--as-needed",
    "-C", "force-unwind-tables=no",
    # `--exclude-libs,ALL` hides symbols that static archives (libstdc++.a,
    # libgomp.a, libonnxruntime.a, the ggml archives) would otherwise leak
    # into the executable's dynamic export table, and `--hash-style=gnu`
    # drops the legacy SysV `.hash` section. IMPORTANT SCOPE NOTE
    # (verified 2026-07-02 against the released v0.13.0/v0.13.1 binaries):
    # the Ubuntu release runners already produce export-clean (1 symbol),
    # gnu-hash-only binaries, so these two flags change NOTHING in the
    # shipped artefacts. They exist to pin that behaviour across host
    # toolchains: on the NimbleX dev box the same build leaked ~1,011
    # exports (985 libstdc++ `__cxa_*`/demangler) plus a ~40 KiB SysV
    # `.hash`, costing 934,344 B (−0.89 MiB once flagged) on the local
    # `gpu` artefact and ~0.9 MiB on the local `cpu` one. With the flags,
    # local size measurements track what CI actually ships. Nothing
    # consumes the exports either way (fono is never dlopen'd; proc-macro
    # dylibs export their registrar from object files, not archives).
    # NEEDED allowlist verified unchanged on both variants.
    "-C", "link-arg=-Wl,--exclude-libs,ALL",
    "-C", "link-arg=-Wl,--hash-style=gnu",
]

[target.'cfg(all(target_os = "windows", target_env = "gnu"))']
rustflags = [
    "-C", "link-arg=-Wl,--allow-multiple-definition",
    "-C", "link-arg=-Wl,--gc-sections",
]

# `-Os -ffunction-sections -fdata-sections` for the C/C++ compiles run by
# `whisper-rs-sys` and `llama-cpp-sys-2` build scripts. Setting them via
# `[env]` so they apply to every cmake/cc invocation in the workspace
# without each sys crate's `build.rs` having to opt in. The
# `-fno-{asynchronous-,}unwind-tables` pair keeps release artefacts from
# retaining frame-unwind metadata that Fono does not use in normal execution;
# C++ exceptions remain enabled because the llama wrapper uses `try`/`catch`.
#
# `-Os` trades ~5 % runtime perf for ~10 % code size on whisper.cpp /
# llama.cpp; the autovectorised hot kernels are explicitly opted into
# higher opt-levels by ggml's CMakeLists, so this only shrinks the
# scaffolding around them.
#
# `GGML_NATIVE=OFF` + explicit AVX2/FMA/F16C/BMI2 flags pin the C/C++
# ISA baseline so the shipped binary runs on every x86_64-v3-ish CPU
# (Intel Haswell ≥ 2013, AMD Excavator ≥ 2015) without leaking the
# build machine's full instruction set. ggml's CMakeLists defaults to
# `GGML_NATIVE=ON` which appends `-march=native` to the compile line
# (see ggml/src/ggml-cpu/CMakeLists.txt:308). On any modern dev box or
# GitHub Actions runner that includes VPDPBUSD (AVX-VNNI) or AVX-512,
# the auto-vectoriser bakes those opcodes into the binary, which then
# SIGILLs on a user's Zen 3 / Kaby Lake / 8th-gen Intel laptop. The
# A/B test on ultra7-258v (Lunar Lake, AVX-VNNI) showed `-march=native`
# costs nothing on a VNNI-capable host either: ±7 % within run-to-run
# noise across tiny/base/small × {fp16, q8_0, q5_1} (median 0.97x fp16,
# 1.02x quants), because ggml's hand-written VNNI dot-product kernels
# are separately gated by `GGML_AVX_VNNI=ON` (also OFF by default).
# Setting these workspace-wide via `[env]` keeps dev and ship builds
# byte-identical. Override locally for a faster native build with
# `GGML_NATIVE=ON cargo build --release` if needed.
#
# whisper-rs-sys forwards any `GGML_*` env var to CMake as `-D...` (see
# whisper-rs-sys-0.15.0/build.rs:278-287). The `cmake` crate documents
# `[env]` table values are only set if not already present in the
# inherited environment, so the override above is non-destructive.
[env]
# 4. Static libstdc++ for the `ort`/`ort-sys` link (Phase 1.2, ADR 0032).
#    `ort-sys` defaults to emitting a *dynamic* `-lstdc++`
#    (build/static_link/mod.rs:20-33), which pulls `libstdc++.so.6` into
#    NEEDED and breaks the size-budget allowlist (verified 2026-05-31:
#    present with `tts-local`, absent without). Relying on the
#    `static=stdc++` that `llama-cpp-2/static-stdcxx` already emits is *not*
#    enough: GNU ld scans llama's `libstdc++.a` to satisfy llama's own C++
#    symbols, then meets `libonnxruntime.a` later on the link line whose C++
#    symbols are still undefined — ld does not re-scan the archive, so a
#    dynamic `-lstdc++` gets pulled in to close them and leaks into NEEDED
#    (measured 2026-06-01: empty value → 5 entries / 25.33 MiB). Setting
#    `ORT_CXX_STDLIB=static:-bundle=stdc++` makes `ort-sys` emit
#    `cargo:rustc-link-lib=static:-bundle=stdc++` adjacent to its *own*
#    objects, so `libstdc++.a` is scanned at the point onnxruntime's C++
#    symbols are undefined and resolves them statically. The `-bundle`
#    modifier is essential: without it rustc tries to *bundle* `libstdc++.a`
#    into the `ort-sys` rlib at ort-sys compile time, where no search path is
#    visible (a build script's `rustc-link-search` only propagates to
#    *dependents*, and `ort-sys` is a sibling of `fono-tts`, not a dependent)
#    — that fails with "could not find native static library `stdc++`".
#    `-bundle` instead defers the archive to the *final* `fono` link, where
#    both `llama-cpp-2/static-stdcxx`'s search path and `fono-tts`'s own (see
#    below) are present. rustc needs a search path that contains
#    `libstdc++.a` for that directive; `crates/fono-tts/build.rs` discovers
#    it via `<cxx> --print-file-name=libstdc++.a` and emits a
#    `rustc-link-search`, which Cargo propagates to the final binary link.
#    Result: four-entry NEEDED, 24.45 MiB (≈ −0.9 MiB vs the dynamic leak).
#    No effect on builds without `tts-local` (ort-sys never runs, and the
#    fono-tts build script no-ops on that feature gate).
#
#    MSVC NOTE: cargo's `[env]` table is NOT target-scoped, so this value
#    also reaches `x86_64-pc-windows-msvc` builds — where ort-sys would
#    emit a bogus `stdc++.lib` link (LNK1181; there is no libstdc++ on
#    MSVC). The Windows build entry points therefore override it with an
#    empty value, which makes ort-sys fall back to its MSVC default (no
#    explicit C++ stdlib link — the MSVC CRT is linked automatically):
#    the CI `windows` job exports `ORT_CXX_STDLIB=` and
#    `scripts/win-remote.sh` passes `--config env.ORT_CXX_STDLIB=''`.
#    See docs/build-windows.md (Windows port Task 3.3).
ORT_CXX_STDLIB = "static:-bundle=stdc++"
CFLAGS = "-Os -ffunction-sections -fdata-sections -fno-asynchronous-unwind-tables -fno-unwind-tables"
CXXFLAGS = "-Os -ffunction-sections -fdata-sections -fno-asynchronous-unwind-tables -fno-unwind-tables"
GGML_NATIVE = "OFF"
GGML_AVX = "ON"
GGML_AVX2 = "ON"
GGML_FMA = "ON"
GGML_F16C = "ON"
GGML_BMI2 = "ON"
