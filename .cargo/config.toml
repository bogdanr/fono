#
# Workspace-wide cargo config. Four concerns are encoded here:
#
# 1. Duplicate-ggml resolution (legacy, retiring under Phase 1 Task 1.2 of
#    `plans/2026-04-30-fono-single-binary-size-v1.md`). Both
#    `whisper-rs-sys` and `llama-cpp-sys-2` statically build their own copy
#    of ggml; without the link flag below GNU ld aborts with "multiple
#    definition of ggml_*". `--allow-multiple-definition` tells ld to keep
#    the first copy and discard the second. Both ggml builds are pinned
#    upstream to the same `ggerganov/ggml` family so the surviving copy is
#    ABI-compatible. This is the lightest-touch fix, recorded in ADR 0018.
#    It will be removed once we land source-level shared ggml (Task 1.2).
#
# 2. Dead-code elimination flags (Phase 1 Task 1.3 of the same plan).
#    `-ffunction-sections -fdata-sections` on the C/C++ side combined with
#    `-Wl,--gc-sections,--as-needed` on the linker line lets ld drop unused
#    arch kernels (AVX-512 / AMX / etc.) and helper functions that ggml,
#    whisper.cpp, and llama.cpp ship by default. Estimated saving: 1–2 MB
#    of `.text` after LTO. `--as-needed` further drops unused `NEEDED`
#    entries that intermediate linkage might otherwise pin.
#
# 3. Static C++/OpenMP runtime on ship builds (Phase 2 Task 2.3 of the same
#    plan). The actual `libstdc++` / `libgomp` linkage is controlled by the
#    `llama-cpp-2/static-stdcxx` and `llama-cpp-2/static-openmp` features in
#    `Cargo.toml`; those make the sys crate emit `static=stdc++` and
#    `static=gomp` in the correct place on the final link line. The musl
#    rustflags below only keep linker GC/as-needed enabled and add the generic
#    GCC runtime static flag for toolchains that honour it.
#
# We scope the flags conservatively — Linux GNU + Linux musl + Windows
# GNU. macOS uses ld64 (different duplicate-symbol semantics, no
# --gc-sections); MSVC's link.exe ignores duplicate COMDATs by default.

[target.'cfg(all(target_os = "linux", target_env = "gnu"))']
rustflags = [
    "-C", "link-arg=-Wl,--allow-multiple-definition",
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,--as-needed",
]

[target.'cfg(all(target_os = "windows", target_env = "gnu"))']
rustflags = [
    "-C", "link-arg=-Wl,--allow-multiple-definition",
    "-C", "link-arg=-Wl,--gc-sections",
]

# `-Os -ffunction-sections -fdata-sections` for the C/C++ compiles run by
# `whisper-rs-sys` and `llama-cpp-sys-2` build scripts. Setting them via
# `[env]` so they apply to every cmake/cc invocation in the workspace
# without each sys crate's `build.rs` having to opt in.
#
# `-Os` trades ~5 % runtime perf for ~10 % code size on whisper.cpp /
# llama.cpp; the autovectorised hot kernels are explicitly opted into
# higher opt-levels by ggml's CMakeLists, so this only shrinks the
# scaffolding around them.
#
# `GGML_NATIVE=OFF` + explicit AVX2/FMA/F16C/BMI2 flags pin the C/C++
# ISA baseline so the shipped binary runs on every x86_64-v3-ish CPU
# (Intel Haswell ≥ 2013, AMD Excavator ≥ 2015) without leaking the
# build machine's full instruction set. ggml's CMakeLists defaults to
# `GGML_NATIVE=ON` which appends `-march=native` to the compile line
# (see ggml/src/ggml-cpu/CMakeLists.txt:308). On any modern dev box or
# GitHub Actions runner that includes VPDPBUSD (AVX-VNNI) or AVX-512,
# the auto-vectoriser bakes those opcodes into the binary, which then
# SIGILLs on a user's Zen 3 / Kaby Lake / 8th-gen Intel laptop. The
# A/B test on ultra7-258v (Lunar Lake, AVX-VNNI) showed `-march=native`
# costs nothing on a VNNI-capable host either: ±7 % within run-to-run
# noise across tiny/base/small × {fp16, q8_0, q5_1} (median 0.97x fp16,
# 1.02x quants), because ggml's hand-written VNNI dot-product kernels
# are separately gated by `GGML_AVX_VNNI=ON` (also OFF by default).
# Setting these workspace-wide via `[env]` keeps dev and ship builds
# byte-identical. Override locally for a faster native build with
# `GGML_NATIVE=ON cargo build --release` if needed.
#
# whisper-rs-sys forwards any `GGML_*` env var to CMake as `-D...` (see
# whisper-rs-sys-0.15.0/build.rs:278-287). The `cmake` crate documents
# `[env]` table values are only set if not already present in the
# inherited environment, so the override above is non-destructive.
[env]
CFLAGS = "-Os -ffunction-sections -fdata-sections"
CXXFLAGS = "-Os -ffunction-sections -fdata-sections"
GGML_NATIVE = "OFF"
GGML_AVX = "ON"
GGML_AVX2 = "ON"
GGML_FMA = "ON"
GGML_F16C = "ON"
GGML_BMI2 = "ON"
