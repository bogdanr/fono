# cargo-deny configuration for Fono.
# Run: `cargo deny check` (CI enforces this; see .github/workflows/ci.yml).

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # gtk3-rs bindings (atk, atk-sys, gdk, gdk-sys, gdk-pixbuf, gdk-pixbuf-sys,
    # gtk, gtk-sys, gtk3-macros) are unmaintained but pulled in transitively
    # via tray-icon -> libappindicator on Linux. tray-icon upstream is aware
    # and migration to gtk4 is tracked. Re-evaluate when tray-icon 0.20+ ships.
    "RUSTSEC-2024-0412", # gtk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gdk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gdk-pixbuf
    "RUSTSEC-2024-0420", # gdk-pixbuf-sys
    "RUSTSEC-2024-0429", # gtk-sys
    "RUSTSEC-2025-0119", # gtk3-macros
    "RUSTSEC-2024-0370", # proc-macro-error (transitive, unmaintained)
    "RUSTSEC-2025-0141", # transitive unmaintained crate
]

[licenses]
version = 2
# Project is GPL-3.0-only. Dependencies must be GPL-3.0-compatible permissive
# licenses (or LGPL, which links fine into a GPL-3.0 binary). Anything more
# restrictive (AGPL, proprietary, Llama-Community, etc.) is rejected.
allow = [
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "Unlicense",            # often dual-licensed: MIT OR Unlicense
    "CDLA-Permissive-2.0",  # webpki-roots license; permissive, GPL-compat
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Pinned forks consumed via `[patch.crates-io]`. Each entry is
# documented in the workspace `Cargo.toml`'s `[patch]` section with
# a corresponding upstream PR link; remove the entry once the PR
# merges and the patch is dropped.
allow-git = [
    "https://github.com/bogdanr/llama-cpp-rs.git",
]
