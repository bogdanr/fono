# cargo-deny configuration for Fono.
# Run: `cargo deny check` (CI enforces this; see .github/workflows/ci.yml).

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # gtk3-rs bindings (glib, atk, atk-sys, gdk, gdk-sys, gdk-pixbuf,
    # gdk-pixbuf-sys, gtk, gtk-sys, gtk3-macros) are unmaintained. They are
    # NOT compiled into any Fono binary on any platform: they appear in
    # Cargo.lock only through cargo's cross-target dependency unification.
    # fono-tray depends on `tray-icon` on Windows ONLY, and `tray-icon`
    # depends on the gtk3 stack on Linux ONLY -- the two edges never coexist
    # on a single build target (`cargo tree -p fono -i glib` prints nothing
    # for both x86_64-unknown-linux-gnu and x86_64-pc-windows-msvc; the Linux
    # tray uses pure-Rust ksni, no GTK). cargo-deny scans the whole
    # multi-target lockfile, so it still flags them -- hence the ignores.
    # Drop these once the gtk3 stack leaves Cargo.lock entirely (e.g. a
    # tray-icon release that no longer pulls gtk3, or a Windows tray that
    # avoids it). The matching Dependabot alert is dismissed as "not used".
    "RUSTSEC-2024-0412", # gtk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gdk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gdk-pixbuf
    "RUSTSEC-2024-0420", # gdk-pixbuf-sys
    "RUSTSEC-2024-0429", # glib (VariantStrIter unsoundness; fixed in 0.20, gated behind gtk4 migration)
    "RUSTSEC-2025-0119", # gtk3-macros
    "RUSTSEC-2024-0370", # proc-macro-error (transitive, unmaintained)
    "RUSTSEC-2025-0141", # transitive unmaintained crate
    # ttf-parser is unmaintained upstream (author stated no further fixes) but
    # is pulled in transitively by the overlay font-rendering stack
    # (cosmic-text/swash). No replacement is available; revisit if the font
    # stack migrates off it.
    "RUSTSEC-2026-0192", # ttf-parser (transitive, unmaintained)
    # quick-xml 0.39.2 is pinned by wayland-scanner 0.31.10 (the latest
    # release on crates.io), pulled in transitively by
    # smithay-client-toolkit/wayland-client for the overlay's Wayland
    # backend. wayland-scanner is a proc-macro that runs at *our* build
    # time over the bundled, trusted Wayland protocol XML files -- it
    # never parses attacker-controlled input at runtime, so the DoS/
    # quadratic-parsing advisories below do not apply to how Fono uses
    # it. Re-evaluate when wayland-scanner bumps its quick-xml pin.
    "RUSTSEC-2026-0194", # quick-xml (transitive via wayland-scanner, build-time only)
    "RUSTSEC-2026-0195", # quick-xml (transitive via wayland-scanner, build-time only)
]

[licenses]
version = 2
# Project is GPL-3.0-only. Dependencies must be GPL-3.0-compatible permissive
# licenses (or LGPL, which links fine into a GPL-3.0 binary). Anything more
# restrictive (AGPL, proprietary, Llama-Community, etc.) is rejected.
allow = [
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "BSL-1.0",              # Boost Software License; OSI + FSF approved, GPL-compat. Pulled in by clipboard-win / error-code (Windows clipboard via arboard).
    "Unlicense",            # often dual-licensed: MIT OR Unlicense
    "CDLA-Permissive-2.0",  # webpki-roots license; permissive, GPL-compat
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# One forked git source: our `llama-cpp-sys-2` fork, consumed via the
# `[patch.crates-io]` block in the workspace `Cargo.toml`. It carries one
# extra commit on top of the published 0.1.150 crate (a model-loading fix
# so hybrid Gated-Delta-Net models such as gemma-4 don't abort on load);
# `llama-cpp-2` still tracks the crates.io release and links this patched
# sys. Keep this in lockstep with the `rev` pinned in `Cargo.toml`; drop it
# once the fix lands in a published release.
allow-git = ["https://github.com/bogdanr/llama-cpp-rs"]
