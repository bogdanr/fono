# cargo-deny configuration for Fono.
# Run: `cargo deny check` (CI enforces this; see .github/workflows/ci.yml).

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Project is GPL-3.0-only. Dependencies must be GPL-3.0-compatible permissive
# licenses (or LGPL, which links fine into a GPL-3.0 binary). Anything more
# restrictive (AGPL, proprietary, Llama-Community, etc.) is rejected.
allow = [
    "GPL-3.0",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
